name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS Xcode
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          xcodebuild -version

      - name: Install just
        run: |
          brew list just >/dev/null 2>&1 || brew install just
          just --version

      - name: Run CI checks
        run: just ci

      - name: Upload Xcode test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: noir-xcode-test-results
          path: build/TestResults/noir.xcresult
          if-no-files-found: ignore
